<nav class="sticky top-0 z-50 bg-white border-b border-primary/10 shadow-sm">
  <div class="max-w-[1440px] mx-auto px-6 h-16 flex items-center justify-between">
    
    <div class="flex items-center gap-10">
      <div class="flex items-center gap-3 cursor-pointer" routerLink="/dashboard">
        <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center text-white">
          <span class="material-icons-round">school</span>
        </div>
        <h1 class="font-bold text-xl text-primary tracking-tight">MentoriaAgil</h1>
      </div>

      <div class="hidden md:flex items-center gap-6" *ngIf="authService.hasRole('MENTOR')">
        <a routerLink="/dashboard" routerLinkActive="text-primary font-bold border-b-2 border-primary" 
           class="h-16 flex items-center text-slate-600 hover:text-primary transition-all px-2 text-sm font-semibold">
          <span class="material-icons-round mr-2 text-lg">dashboard</span>
          Minhas Solicitações
        </a>
      </div>
    </div>

    <div class="flex items-center gap-4">
      <div class="relative">
        <button (click)="toggleMenu()" 
                class="flex items-center gap-2 p-1 pl-4 bg-slate-50 rounded-full border border-slate-200 hover:ring-2 ring-primary/20 transition-all">
          <span class="text-xs font-bold text-slate-600 hidden sm:block">
            {{ (authService.currentUser$ | async)?.name }}
          </span>
          <img alt="Avatar" class="w-8 h-8 rounded-full border-2 border-white shadow-sm"
            [src]="'https://ui-avatars.com/api/?name=' + (authService.currentUser$ | async)?.name + '&background=137fec&color=fff'" />
        </button>

        <div *ngIf="isMenuOpen()" class="absolute right-0 mt-3 w-64 bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden z-50 animate-in fade-in slide-in-from-top-2">
          <div class="p-4 border-b border-slate-100 bg-slate-50/50">
            <p class="text-[10px] text-primary font-bold uppercase tracking-widest">Acesso {{ (authService.currentUser$ | async)?.role }}</p>
            <p class="font-bold text-slate-800 mt-1">{{ (authService.currentUser$ | async)?.name }}</p>
          </div>
          <div class="p-2">
            <button (click)="logout()" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-red-500 hover:bg-red-50 transition-colors">
              <span class="material-icons-round">logout</span>
              <span class="text-sm font-bold">Encerrar Sessão</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>
